<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONSTER CHEKLIST | Accès Division</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --primary: #00FF41;
            --primary-glow: rgba(0, 255, 65, 0.4);
            --bg: #020408;
            --card: #0A0C12;
            --text: #FFFFFF;
            --text-muted: #8B949E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Scanline Animation */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            opacity: 0.1;
            z-index: 10;
            animation: scanning 4s linear infinite;
        }

        @keyframes scanning {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        .container {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        .logo-wrap {
            margin-bottom: 2rem;
            animation: fadeIn 1.5s ease;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary-glow);
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 3px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(0, 255, 65, 0.1);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(0, 255, 65, 0.05), transparent);
        }

        .os-badge {
            display: inline-block;
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            padding: 1.2rem 2rem;
            border-radius: 16px;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 0 20px var(--primary-glow);
            cursor: pointer;
            position: relative;
            z-index: 100;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 35px var(--primary-glow);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .secondary-info {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .secondary-info a {
            color: var(--primary);
            text-decoration: none;
        }

        #qr-container {
            margin: 1.5rem auto;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            display: none;
            width: 150px;
            height: 150px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        canvas#qr {
            width: 100%;
            height: 100%;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.03;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <canvas id="matrix" class="matrix-bg"></canvas>

    <div class="container">
        <div class="logo-wrap">
            <h1 class="logo">MONSTER CHEKLIST</h1>
            <p class="tagline">DIVISION PROTOCOL EX-54</p>
        </div>

        <div class="card">
            <div id="os-badge" class="os-badge">Détection en cours...</div>
            <h2 id="main-title">DÉPLOIEMENT DE L'AGENT</h2>
            <p id="main-desc">Rejoignez la division Monster Cheklist et commencez l'archivage de votre collection.</p>

            <div id="qr-container">
                <canvas id="qr"></canvas>
            </div>

            <a href="https://github.com/Julien0ff/Monster-Cheklist" id="download-btn" class="btn">
                <span>DÉPLOYER L'UNITÉ</span>
            </a>

            <div class="secondary-info">
                Version 1.0.0 • <a href="https://github.com/Julien0ff/Monster-Cheklist" target="_blank">Code Source</a>
            </div>
        </div>
    </div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF41";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // Pas d'APK pour l'instant — tout passe par Expo Go

        function detectOS() {
            const userAgent = window.navigator.userAgent || window.navigator.vendor || window.opera;
            const btn = document.getElementById('download-btn');
            const badge = document.getElementById('os-badge');
            const title = document.getElementById('main-title');
            const desc = document.getElementById('main-desc');
            const qrCont = document.getElementById('qr-container');

            // ---------------------------------------------------------
            // 3. PONT D'AUTHENTIFICATION
            // ---------------------------------------------------------
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                // Mode Pont d'Auth activé
                badge.innerText = "AUTHENTIFICATION";
                badge.style.background = "#FF0055"; // Rouge Alerte
                title.innerText = "PROTOCOLE VALIDÉ";
                desc.innerHTML = "Votre identité a été vérifiée par la Division.<br><br><strong style='color:#00FF41'>Cliquez ci-dessous pour injecter vos accès dans l'application.</strong>";
                btn.innerHTML = "🎯 FINALISER LA CONNEXION";
                
                // On renvoie vers l'app avec les jetons dans l'URL
                // Mise à jour vers SDK 54
                const appUrl = "exp://u.expo.dev/8610cfad-c5dd-4bd8-a30e-ca08c8f97d12?channel-name=main&runtime-version=exposdk:54.0.0" + hash;
                btn.href = appUrl;
                
                qrCont.style.display = 'none';
                return;
            }

            // 1. Détection Desktop Immédiate (QR Code)
            const isMobile = /android|iphone|ipad|ipod/i.test(userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            // Lien vers la page projet officielle
            const BASE_URL = "https://expo.dev/@fxyy/monster-technist";
            const CUSTOM_SCHEME = "monster-technist://";

            if (!isMobile) {
                badge.innerText = "Poste de Contrôle";
                title.innerText = "CONSOLE BUREAU";
                desc.innerText = "Scannez ce QR Code avec votre téléphone pour ouvrir l'app directement dans Expo Go.";
                btn.innerHTML = "👾 ACCÉDER AU GITHUB";
                btn.href = "https://github.com/Julien0ff/Monster-Cheklist";

                qrCont.style.display = 'block';
                new QRious({
                    element: document.getElementById('qr'),
                    value: BASE_URL,
                    size: 200,
                    padding: 0
                });
                return;
            }

            // 2. Logique Mobile — Accès direct via Expo Go
            if (/android/i.test(userAgent)) {
                badge.innerText = "Android Détecté";
                title.innerText = "ACCÈS CHEKLIST";
                desc.innerHTML = "Lancez l'agent via l'application <strong style='color:#00FF41'>Expo Go</strong>.<br><br><small style='opacity:0.6'>Si l'app n'est pas installée, récupérez-la sur le Play Store.</small>";
                btn.innerHTML = "🚀 LANCER DANS EXPO GO";
                btn.href = BASE_URL;
            }
            else {
                // iOS
                badge.innerText = "iOS Détecté";
                title.innerText = "ACCÈS CHEKLIST";
                desc.innerHTML = "Lancez l'agent via la Division <strong style='color:#00FF41'>Monster Cheklist</strong>.<br><br><small style='opacity:0.6'>Utilisez le lien direct pour ouvrir votre build.</small>";
                btn.innerHTML = "🚀 OUVRIR L'APPLICATION";
                // On privilégie le custom scheme sur iOS pour éviter de rester dans le navigateur
                btn.href = CUSTOM_SCHEME;
            }
        }

        detectOS();
    </script>
</body>

</html>
